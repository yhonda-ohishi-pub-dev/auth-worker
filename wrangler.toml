name = "auth-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "24b45709d060d957340180e995f0d373"

[vars]
AUTH_WORKER_ORIGIN = "https://auth.mtamaramu.com"
ALLOWED_REDIRECT_ORIGINS = "https://nuxt-pwa-carins.mtamaramu.com,https://ohishi2.mtamaramu.com,https://items.mtamaramu.com,https://auth.mtamaramu.com,https://auth.ippoan.org,https://dtako-admin.m-tama-ramu.workers.dev,https://alc-app.m-tama-ramu.workers.dev"
ALC_API_ORIGIN = "https://alc-api.ippoan.org"

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "auth.mtamaramu.com"
custom_domain = true

[[routes]]
pattern = "auth.ippoan.org"
custom_domain = true

# Secrets (set via `wrangler secret put`):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# OAUTH_STATE_SECRET

[env.staging]
name = "auth-worker-staging"
workers_dev = true
routes = []

[env.staging.vars]
AUTH_WORKER_ORIGIN = "https://auth-worker-staging.m-tama-ramu.workers.dev"
ALLOWED_REDIRECT_ORIGINS = "https://auth-worker-staging.m-tama-ramu.workers.dev,https://alc-app-staging.m-tama-ramu.workers.dev,https://nuxt-pwa-carins-staging.m-tama-ramu.workers.dev,https://dtako-admin-staging.m-tama-ramu.workers.dev,https://nuxt-ichibanboshi-staging.m-tama-ramu.workers.dev,https://nuxt-notify-staging.m-tama-ramu.workers.dev"
ALC_API_ORIGIN = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
