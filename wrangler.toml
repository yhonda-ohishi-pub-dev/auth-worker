name = "auth-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "24b45709d060d957340180e995f0d373"

[vars]
AUTH_WORKER_ORIGIN = "https://auth.ippoan.org"
ALC_API_ORIGIN = "https://alc-api.ippoan.org"
ALC_API_STAGING_ORIGIN = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
WORKER_ENV = "prod"
# e-Gov (Keycloak) OAuth — sbx (sandbox) endpoint; same on prod + staging since
# we only integrate with e-Gov's sbx environment.
EGOV_AUTH_BASE = "https://account2.sbx.e-gov.go.jp/auth"
EGOV_CLIENT_ID = "K26XGOmbDusxfKsp"

[[kv_namespaces]]
binding = "AUTH_CONFIG"
id = "f13ecae4b69043819c09f606abb84797"

# LINE WORKS webhook 受信用 Durable Object (bot_id ごとに 1 instance)
[[durable_objects.bindings]]
name = "LINEWORKS_WEBHOOK_DO"
class_name = "LineworksWebhookDO"

[[migrations]]
tag = "v1-lineworks-webhook"
new_sqlite_classes = ["LineworksWebhookDO"]

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "auth.mtamaramu.com"
custom_domain = true

[[routes]]
pattern = "auth.ippoan.org"
custom_domain = true

# Secrets (set via `wrangler secret put` — prod / staging とも同名):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# OAUTH_STATE_SECRET
# JWT_SECRET           (HS256 secret shared with rust-alc-api; verifies /top cookie + signs internal JWT)
# EGOV_CLIENT_SECRET   (e-Gov sbx softwareID K26XGOmbDusxfKsp 用の client_secret)
# SSO_ENCRYPTION_KEY   (LINE WORKS bot_secret_encrypted 復号用、rust-alc-api と同値)
#
# Allowlist (managed via `wrangler kv key put --remote --namespace-id=f13ecae4b69043819c09f606abb84797 <key>`):
#   origins:prod    - production frontends
#   origins:staging - staging frontends
#   origins:dev     - dev-proxy frontends (*-dev.ippoan.org)

[env.staging]
name = "auth-worker-staging"
workers_dev = true

[[env.staging.routes]]
pattern = "auth-staging.ippoan.org"
custom_domain = true

[env.staging.vars]
AUTH_WORKER_ORIGIN = "https://auth-staging.ippoan.org"
ALC_API_ORIGIN = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
ALC_API_STAGING_ORIGIN = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
WORKER_ENV = "staging"
EGOV_AUTH_BASE = "https://account2.sbx.e-gov.go.jp/auth"
EGOV_CLIENT_ID = "K26XGOmbDusxfKsp"

[[env.staging.kv_namespaces]]
binding = "AUTH_CONFIG"
id = "f13ecae4b69043819c09f606abb84797"

[[env.staging.durable_objects.bindings]]
name = "LINEWORKS_WEBHOOK_DO"
class_name = "LineworksWebhookDO"

[[env.staging.migrations]]
tag = "v1-lineworks-webhook"
new_sqlite_classes = ["LineworksWebhookDO"]
