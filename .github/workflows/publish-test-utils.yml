name: Publish Test Utils Package

on:
  pull_request:
    paths:
      - 'packages/test-utils/**'
      - '.github/workflows/publish-test-utils.yml'
  push:
    branches: [main]
    paths:
      - 'packages/test-utils/**'
      - '.github/workflows/publish-test-utils.yml'

jobs:
  dev:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ippoan'

      - name: Set dev version
        working-directory: packages/test-utils
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          PR_NUMBER=${{ github.event.number }}
          VERSION="0.1.${PR_NUMBER}-dev.${SHORT_SHA}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure npm auth
        working-directory: packages/test-utils
        run: |
          echo "@ippoan:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish dev
        working-directory: packages/test-utils
        run: npm publish --tag dev

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              `📦 test-utils \`${process.env.VERSION}\` published!`,
              '',
              '```bash',
              'npm install @ippoan/test-utils@dev',
              '```',
              '',
              `Release version (after merge): \`0.1.${{ github.event.number }}\``
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ippoan'

      - name: Get PR number from merge commit
        run: |
          MSG=$(git log -1 --pretty=%s)
          PR_NUMBER=$(echo "$MSG" | grep -oP '#\K[0-9]+' | head -1)
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not extract PR number from: $MSG"
            exit 1
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Set release version
        working-directory: packages/test-utils
        run: |
          VERSION="0.1.${PR_NUMBER}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure npm auth
        working-directory: packages/test-utils
        run: |
          echo "@ippoan:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish release
        working-directory: packages/test-utils
        run: npm publish
