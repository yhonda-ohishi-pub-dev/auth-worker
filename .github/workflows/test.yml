name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      install_command: 'npm install'
      has_integration: true
      typecheck_command: 'npx tsc --noEmit && npx tsc -p test/tsconfig.json --noEmit'
      post_install_script: |
        npx wrangler types
        bash scripts/export-ts-bindings.sh src/types
      deploy_staging_script: 'npx wrangler deploy --env staging --var VERSION:${{ github.sha }}'
      deploy_release_script: 'npx wrangler deploy --var VERSION:${{ github.ref_name }}'
      npm_scope: '@ippoan'
      npm_publish_directory: 'packages/auth-client'
    secrets: inherit
