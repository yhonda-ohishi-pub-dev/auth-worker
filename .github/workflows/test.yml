name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/alc-app/.github/actions/pr-limit@main

  test:
    needs: [pr-limit]
    if: always() && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ippoan"
          cache: "npm"

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wrangler types
        run: npx wrangler types

      - name: Sync ts-rs types from rust-alc-api
        run: bash scripts/export-ts-bindings.sh src/types
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check (src + test)
        run: npx tsc --noEmit && npx tsc -p test/tsconfig.json --noEmit

      - run: npm run test:coverage

      - run: node scripts/check_coverage_100.mjs

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  integration-test:
    name: API Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ippoan"
          cache: "npm"

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wrangler types
        run: npx wrangler types

      - name: Sync ts-rs types from rust-alc-api
        run: bash scripts/export-ts-bindings.sh src/types
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check (src + test)
        run: npx tsc --noEmit && npx tsc -p test/tsconfig.json --noEmit

      - name: Start API + DB containers
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 5

      - name: Run all tests in live mode with coverage
        run: npx vitest run --coverage
        env:
          ALC_API_URL: http://localhost:18081

      - run: node scripts/check_coverage_100.mjs

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  deploy-staging:
    name: Deploy Staging
    if: always() && github.event_name == 'pull_request' && needs.test.result == 'success' && needs.integration-test.result == 'success'
    needs: [test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ippoan'
          cache: 'npm'

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Workers (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --env staging

  deploy-release:
    name: Deploy Release
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.test.result == 'success' && needs.integration-test.result == 'success'
    needs: [test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ippoan'
          cache: 'npm'

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Workers (release)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
