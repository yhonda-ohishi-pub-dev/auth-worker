name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@yhonda-ohishi-pub-dev"
          cache: "npm"

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run test:coverage

      - run: node scripts/check_coverage_100.mjs

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  integration-test:
    name: API Integration
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@yhonda-ohishi-pub-dev"
          cache: "npm"

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start API + DB containers
        run: docker compose -f docker-compose.test.yml up -d --wait
        timeout-minutes: 5

      - name: Run live integration tests
        run: npx vitest run test/live/
        env:
          ALC_API_URL: http://localhost:18081

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
